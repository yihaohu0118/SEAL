# please refer to external/config_fallback/ppo_trainer.yaml for more details about verl configuration.
algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false

data:
  train_batch_size: 32         
  max_prompt_length: 4000      
  max_response_length: 21580   
  filter_overlong_prompts: true
  truncation: "error"
  return_raw_chat: true
  train_files: null
  val_files: null
  val_batch_size: 256
  # shuchang: 'val' or 'test_norm' for easy switching to test test_norm
  val_type: "val"

actor_rollout_ref:
  hybrid_engine: true          
  model:
    path: Qwen/Qwen2.5-14B-Instruct      
    use_remove_padding: true
    enable_gradient_checkpointing: true
  rollout:
    use_qwen3: false                      
    enable_request_id: false
    prompt_length: 20480
    response_length: 4096
    max_model_len: 25580                  
    temperature: 0.9
    log_prob_micro_batch_size_per_gpu: 1
    tensor_model_parallel_size: 1
    name: vllm
    mode: async
    gpu_memory_utilization: 0.6
    n: 8
    log_prob_max_token_len_per_gpu: 25580
    val_kwargs:
      n: 8
    
    debug_llm_io: false
    multi_turn:
      completion_callback: agentevolver.module.trainer.simple_completion_callback.SimpleCompletionCallback
      enable: true
      format: llama3_json
      max_steps: 30
      tool_config_path: ""
    custom_dataflow_cls:
      path: ""
      name: ""
    max_env_worker: 32
    context_template: "linear"
    context_template_train_sp_action: false
    max_env_len: 4096
    sparse: true
  actor:
    # clip range high for off-policy samples
    off_cliprange_high: 0.6
    optim:
      lr: 1e-6
    ppo_micro_batch_size_per_gpu: 1
    # micro batch size for PPO
    ppo_mini_batch_size: 8
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    entropy_coeff: 0
    ppo_max_token_len_per_gpu: 25580
    fsdp_config:
      param_offload: false
      optimizer_offload: false
    
    loss_agg_mode: token-mean
    clip_ratio_high: 0.28
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      param_offload: true
    log_prob_max_token_len_per_gpu: 25580

critic:
  ppo_max_token_len_per_gpu: 25580
  forward_max_token_len_per_gpu: 25580


env_service:
  env_type: "bfcl"
  env_url: "http://127.0.0.1:8082"
  env_feedin_preference: code # code, text, box
  bfcl:
    # BFCL-only diagnostic switches. Defaults favor paper-safe evaluation.
    strict_tool_parser: true
    # Reject calls to functions that have not been exposed in the current tool list.
    enforce_available_tools: true
    # bfcl_qwen_fc mirrors BFCL's QwenFCHandler tool prompt.
    tool_prompt_mode: bfcl_qwen_fc
    # bfcl_tool_response mirrors BFCL's <tool_response> observation wrapper.
    tool_result_mode: bfcl_tool_response

trainer:
  n_gpus_per_node: 4
  nnodes: 1
  critic_warmup: 0
  logger: ["console"]
  project_name: "bfcl_seal"
  experiment_name: "bfcl_seal_default"
  save_freq: 10000
  save_best_checkpoint: false
  best_checkpoint_metric: null
  best_checkpoint_mode: max
  keep_only_best_checkpoint: true
  save_best_checkpoint_in_val_only: false
  test_freq: 10
  total_epochs: 40
  val_before_train: true
  validation_data_dir: "experiments/tech_synthetic/${trainer.experiment_name}/validation_log"
  rollout_data_dir: "experiments/tech_synthetic/${trainer.experiment_name}/rollout_log"
  val_only: false



###############################################################################
# AgentEvolver settings
# The details of the following settings can be found in our docs.

thread_pool:
  # max number of threads
  max_workers: 8

task_manager:
  # tasks will be explored once if set. use it if you want to keep the same explorations.
  train_data_path: tasks_explored.train.json
  val_data_path: tasks_explored.val.json
  # model used to explore the environment
  llm_client: qwen-plus

  # repetition of exploration
  # 0 - stop exploration
  n: 0
  # env profiles used in exploration. If you set n to 0, just ignore this.
  env_profile: cookbook/env_profiles/bfcl.json
  # batch size of dynamic synthetic data
  # this should be the same as train_batch_size
  bs: ${data.train_batch_size}
  # max number of threads for exploration
  num_explore_threads: ${thread_pool.max_workers}

  # mixture strategy
  mixture:
    # whether to use original tasks from the environment
    use_original_tasks: true
    # ratio of synthetic data
    synthetic_data_ratio: 0.0
    # whether to shuffle tasks *after* mixture
    shuffle: true

  # grader settings                 
  grader:
    # grader used for original tasks
    original_grader: env
    # grader used for synthetic data
    synthetic_grader: env
    
  # strategy settings
  strategy: random
  strategy_args:
    # max number of steps for exploration
    max_explore_step: 30
    # max number of LLM retries
    max_llm_retries: 6
    # env url
    env_url: ${env_service.env_url}
    # LLM parameters for exploration
    exploration_llm_temperature: 1.0
    exploration_llm_top_p: 1.0
    exploration_llm_top_k: 100

tocf:
  # Main switch for Task distribution / Observation / Constraint / Feedback patches.
  enable: false
  stats:
    enable: true
    dump_dir: null
  feedback:
    dense_reward:
      enable: false
      partial_credit_cap: 0.5
      partial_credit_weight: 1.0
      cap_decay: false
      min_cap: 0.1
